<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" role="img" aria-label="Wholesail — Operator-grade deal infrastructure for real-estate wholesalers.">
  <title>Wholesail</title>
  <desc>Operator-grade deal infrastructure for real-estate wholesalers. AI deal inspector, state-aware compliance, and attorney-ready paperwork.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1a12"/>
      <stop offset="55%" stop-color="#0d1612"/>
      <stop offset="100%" stop-color="#040907"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8a6a3d"/>
      <stop offset="50%" stop-color="#d6b877"/>
      <stop offset="100%" stop-color="#8a6a3d"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#d6b877" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d6b877" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a3a2a" stroke-width="0.5" opacity="0.45"/>
    </pattern>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="400" fill="url(#bg)"/>
  <rect width="1280" height="400" fill="url(#grid)"/>
  <ellipse cx="640" cy="200" rx="520" ry="180" fill="url(#halo)"/>

  <!-- corner ornaments -->
  <g stroke="#b08d57" stroke-width="1" fill="none" opacity="0.55">
    <path d="M40 40 L 100 40 M40 40 L 40 100"/>
    <path d="M1240 40 L 1180 40 M1240 40 L 1240 100"/>
    <path d="M40 360 L 100 360 M40 360 L 40 300"/>
    <path d="M1240 360 L 1180 360 M1240 360 L 1240 300"/>
  </g>

  <!-- diamond mark -->
  <g transform="translate(170 200)" filter="url(#soft)">
    <path d="M0 -34 L 30 0 L 0 34 L -30 0 Z" fill="none" stroke="url(#brass)" stroke-width="1.6"/>
    <path d="M0 -22 L 18 0 L 0 22 L -18 0 Z" fill="none" stroke="#d6b877" stroke-width="0.9" opacity="0.7"/>
    <circle cx="0" cy="0" r="3" fill="#d6b877"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(230 175)">
    <text x="0" y="36"
          font-family="Fraunces, Georgia, serif"
          font-weight="500"
          font-size="78"
          letter-spacing="-1"
          fill="#f5f1e8">Wholesail</text>
    <line x1="0" y1="58" x2="380" y2="58" stroke="#b08d57" stroke-width="1" opacity="0.55"/>
    <text x="0" y="92"
          font-family="Inter, system-ui, sans-serif"
          font-size="14"
          letter-spacing="6"
          fill="#d6b877">OPERATOR—GRADE  ·  DEAL  INFRASTRUCTURE</text>
  </g>

  <!-- right ledger panel -->
  <g transform="translate(880 110)">
    <rect width="320" height="180" rx="8" fill="none" stroke="#1a3a2a" stroke-width="1"/>
    <line x1="0" y1="38" x2="320" y2="38" stroke="#1a3a2a"/>
    <text x="16" y="26" font-family="Inter, system-ui, sans-serif" font-size="10" letter-spacing="3" fill="#7d7a6f">DEAL  ·  WS-2042-0K</text>
    <text x="304" y="26" text-anchor="end" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#7d7a6f">PURSUE</text>
    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#b8b4a4">
      <text x="16" y="64">ARV</text><text x="304" y="64" text-anchor="end" fill="#e9e4d4">$ 245,000</text>
      <text x="16" y="86">REPAIRS</text><text x="304" y="86" text-anchor="end" fill="#e9e4d4">$  38,400</text>
      <text x="16" y="108">MAO  (70%)</text><text x="304" y="108" text-anchor="end" fill="#e9e4d4">$ 133,100</text>
      <text x="16" y="130">SPREAD</text><text x="304" y="130" text-anchor="end" fill="#d6b877">$  17,300</text>
    </g>
    <line x1="16" y1="146" x2="304" y2="146" stroke="#1a3a2a" stroke-dasharray="2 4"/>
    <text x="16" y="166" font-family="Inter, system-ui, sans-serif" font-size="10" letter-spacing="2" fill="#7d7a6f">LEVERAGE  SCORE</text>
    <rect x="160" y="158" width="144" height="10" rx="2" fill="#16241c"/>
    <rect x="160" y="158" width="108" height="10" rx="2" fill="url(#brass)"/>
  </g>

  <!-- footer rule + tagline -->
  <line x1="40" y1="345" x2="1240" y2="345" stroke="#1a3a2a" stroke-width="1"/>
  <text x="40" y="370" font-family="Inter, system-ui, sans-serif" font-size="11" letter-spacing="3" fill="#7d7a6f">UNDERWRITE  ·  ENFORCE  ·  CLOSE</text>
  <text x="1240" y="370" text-anchor="end" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#7d7a6f">v0.1  ·  beta</text>
</svg>
